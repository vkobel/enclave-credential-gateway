routes:
  openai:
    upstream: https://api.openai.com
    credential_sources:
      - env: OPENAI_API_KEY
        inject_header: Authorization
        format: "Bearer {}"

  anthropic:
    upstream: https://api.anthropic.com
    credential_sources:
      - env: ANTHROPIC_API_KEY
        inject_header: Authorization
        format: "Bearer {}"
        prefix: sk-ant-oat
        reject_prefixes: [ccgw_]
        extra_headers:
          anthropic-beta: oauth-2025-04-20
      - env: ANTHROPIC_API_KEY
        inject_header: x-api-key
        format: "{}"
        reject_prefixes: [ccgw_, sk-ant-oat]

  github:
    upstream: https://api.github.com
    aliases:
      - prefix: api
        strip_prefix: /v3
    git_protocol:
      upstream: https://github.com
      credential_sources:
        - env: GITHUB_TOKEN
          inject_header: Authorization
          basic_user: x-access-token
    credential_sources:
      - env: GITHUB_TOKEN
        inject_header: Authorization
        format: "Bearer {}"

tools:
  gh:
    description: GitHub CLI plus Git smart-HTTP through the gateway
    routes: [github]
    git_credential_helper: true
    env:
      - requires_route: github
        key: GH_HOST
        value: "{{gateway_host}}"
      - requires_route: github
        key: GH_ENTERPRISE_TOKEN
        value: "{{token}}"
      - requires_route: github
        key: GH_TOKEN
        value: "{{token}}"

  codex:
    description: OpenAI Codex CLI
    routes: [openai]
    env:
      - key: CODEX_HOME
        value: "{{generated_root}}/home"
    files:
      - id: config
        requires_route: openai
        generated_path: "{{generated_root}}/home/config.toml"
        content: |
          model_provider = "openai"
          openai_base_url = "{{route_url:openai}}/v1"
      - id: auth
        requires_route: openai
        generated_path: "{{generated_root}}/home/auth.json"
        content: |
          {
            "auth_mode": "apikey",
            "OPENAI_API_KEY": "{{token}}"
          }

  claude-code:
    description: Anthropic Claude Code environment
    experimental: true
    routes: [anthropic]
    env:
      - requires_route: anthropic
        key: ANTHROPIC_API_KEY
        value: "{{token}}"
      - requires_route: anthropic
        key: ANTHROPIC_BASE_URL
        value: "{{route_url:anthropic}}"
