schema: spec-driven

context: |
  Project: coco-credential-gateway — a confidential credential proxy for AI agents running inside a Phala Cloud TDX Confidential VM (CVM).

  Tech stack: Rust (edition 2021), Axum, Hyper, hyper-rustls, Tokio, reqwest, serde_json, subtle (constant-time), zeroize.

  Key dependency: nono-proxy (https://github.com/always-further/nono) used as a Cargo git library. We compose its modules (RouteStore, reverse, credential, token::constant_time_eq, filter::ProxyFilter) inside a custom Axum server. We do NOT use nono_proxy::start() — it forces ephemeral tokens incompatible with our pre-shared COCO_PHANTOM_TOKEN model.

  Attestation: Phala tappd sidecar at http://localhost:8090/prpc/Tappd.TdxQuote (no attestation-rs for POC). Returns base64-encoded TDX DCAP QuoteV4.

  Deployment: Phala Cloud TDX CVM via Docker Compose. Secrets (COCO_PHANTOM_TOKEN, OPENAI_API_KEY, ANTHROPIC_API_KEY, GITHUB_TOKEN) injected by Phala's encrypted secret mechanism as env vars.

  Architecture (POC = Path B): Standalone coco-gateway binary. Agents voluntarily point BASE_URL at the CVM. Egress enforcement gap documented — Path C (nono fork with Landlock enforcement + client-side attestation verification) is the target architecture post-POC.

  Conventions: no .unwrap()/.expect() in library code, zeroize sensitive values, constant-time comparisons for tokens, TLS-only outbound.

rules:
  tasks:
    - Each task should be completable in one focused coding session
    - Prefer explicit file paths and function names over vague descriptions
