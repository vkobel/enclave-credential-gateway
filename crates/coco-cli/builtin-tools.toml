[adapters.shell]

[[adapters.shell.env]]
requires_route = "anthropic"
key = "ANTHROPIC_BASE_URL"
value = "{{route_url:anthropic}}"

[[adapters.shell.env]]
requires_route = "anthropic"
key = "ANTHROPIC_API_KEY"
value = "{{token}}"

[[adapters.shell.env]]
requires_route = "openai"
key = "OPENAI_BASE_URL"
value = "{{route_url:openai}}"

[[adapters.shell.env]]
requires_route = "openai"
key = "OPENAI_API_KEY"
value = "{{token}}"

[[adapters.shell.env]]
requires_route = "github"
key = "GH_HOST"
value = "{{gateway_host}}"

[[adapters.shell.env]]
requires_route = "github"
key = "GH_ENTERPRISE_TOKEN"
value = "{{token}}"

[[adapters.shell.env]]
requires_route = "github"
key = "GH_TOKEN"
value = "{{token}}"

[[adapters.shell.env]]
requires_route = "ollama"
key = "OLLAMA_HOST"
value = "{{route_url:ollama}}"

[[adapters.shell.env]]
requires_route = "httpbin"
key = "HTTPBIN_TOKEN"
value = "{{token}}"

[adapters.gh]

[[adapters.gh.env]]
requires_route = "github"
key = "GH_HOST"
value = "{{gateway_host}}"

[[adapters.gh.env]]
requires_route = "github"
key = "GH_ENTERPRISE_TOKEN"
value = "{{token}}"

[[adapters.gh.env]]
requires_route = "github"
key = "GH_TOKEN"
value = "{{token}}"

[adapters.codex]
default_render_file = "config"
default_install_file = "config"

[[adapters.codex.files]]
id = "config"
requires_route = "openai"
install_path = "~/.codex/config.toml"
content = '''
[model]
provider = "openai"
name = "o4-mini"
openai_base_url = "{{route_url:openai}}"

[auth]
api_key = "{{token}}"
'''

[adapters.opencode]
default_render_file = "config"

[[adapters.opencode.files]]
id = "config"
managed_path = "opencode.json"
# OpenCode resolves {env:...} placeholders from the environment at runtime.
content = '''
{
  "$schema": "https://opencode.ai/config.json",
  "provider": {
    "openai": {
      "options": {
        "baseURL": "{{route_url:openai}}",
        "apiKey": "{env:OPENAI_API_KEY}"
      }
    },
    "anthropic": {
      "options": {
        "baseURL": "{{route_url:anthropic}}",
        "apiKey": "{env:ANTHROPIC_API_KEY}"
      }
    },
    "groq": {
      "options": {
        "baseURL": "{{route_url:groq}}",
        "apiKey": "{env:GROQ_API_KEY}"
      }
    },
    "together": {
      "options": {
        "baseURL": "{{route_url:together}}",
        "apiKey": "{env:TOGETHER_API_KEY}"
      }
    },
    "elevenlabs": {
      "options": {
        "baseURL": "{{route_url:elevenlabs}}",
        "apiKey": "{env:ELEVENLABS_API_KEY}"
      }
    }
  }
}
'''

[[adapters.opencode.env]]
key = "OPENCODE_CONFIG"
value = "{{managed_file:config}}"

[[adapters.opencode.env]]
requires_route = "openai"
key = "OPENAI_API_KEY"
value = "{{token}}"

[[adapters.opencode.env]]
requires_route = "anthropic"
key = "ANTHROPIC_API_KEY"
value = "{{token}}"

[[adapters.opencode.env]]
requires_route = "groq"
key = "GROQ_API_KEY"
value = "{{token}}"

[[adapters.opencode.env]]
requires_route = "together"
key = "TOGETHER_API_KEY"
value = "{{token}}"

[[adapters.opencode.env]]
requires_route = "elevenlabs"
key = "ELEVENLABS_API_KEY"
value = "{{token}}"

[adapters."claude-code"]
experimental = true
default_render_file = "env"

[[adapters."claude-code".files]]
id = "env"
requires_route = "anthropic"
content = '''
# Experimental: Claude Code support is routed through shell environment variables.
export ANTHROPIC_API_KEY="{{token}}"
export ANTHROPIC_BASE_URL="{{route_url:anthropic}}"
'''
