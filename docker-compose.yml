services:
  coco-gateway:
    build: .
    expose:
      - "8080"
    environment:
      - COCO_PHANTOM_TOKEN
      - COCO_ADMIN_TOKEN=${COCO_ADMIN_TOKEN}
      - COCO_TOKENS_FILE=/data/tokens.json
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    volumes:
      - coco-data:/data
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped
    depends_on:
      - coco-gateway

volumes:
  coco-data:
  caddy-data:
  caddy-config:
