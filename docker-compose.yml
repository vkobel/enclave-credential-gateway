services:
  enclave-credential-gateway:
    build: .
    expose:
      - "8080"
    environment:
      - GATE_PHANTOM_TOKEN
      - GATE_ADMIN_TOKEN=${GATE_ADMIN_TOKEN}
      - GATE_TOKENS_FILE=/data/tokens.json
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    volumes:
      - gate-data:/data
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped
    depends_on:
      - enclave-credential-gateway

volumes:
  gate-data:
  caddy-data:
  caddy-config:
