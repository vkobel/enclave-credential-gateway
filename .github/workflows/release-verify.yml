name: Reproducible build

# Independently rebuilds a tagged release on a clean amd64 runner and verifies
# the artifacts byte-for-byte against the hashes recorded on the annotated tag.
# Tag a release locally with `./scripts/build-stagex-oci.sh --tag vX.Y.Z` and
# push the tag; only `v*` tags trigger this workflow.
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  issues: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # checkout leaves the pushed tag as a peeled ref to the commit; re-fetch
      # the annotated tag object so `git cat-file tag` can read the hashes.
      - name: Restore annotated tag object
        run: git fetch --force origin "refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Reproduce and verify artifacts
        run: ./scripts/build-stagex-oci.sh --check "${GITHUB_REF_NAME}"

      - name: File issue if reproduction breaks
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const ref = context.ref.replace('refs/tags/', '');
            const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Reproducibility check failed for ${ref}`,
              body: [
                `\`build-stagex-oci.sh --check\` did not reproduce the hashes recorded on \`${ref}\`.`,
                ``,
                `Run: ${run}`,
              ].join('\n'),
              labels: ['reproducibility'],
            });
